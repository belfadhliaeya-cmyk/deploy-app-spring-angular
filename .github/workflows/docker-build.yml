name: Build and Push Docker Images

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven

    - name: Build JAR with Maven
      run: mvn clean package -DskipTests
      working-directory: springboot/app

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push Backend
      uses: docker/build-push-action@v5
      with:
        context: ./springboot/app
        file: ./springboot/app/Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app:${{ github.sha }}

    - name: Build and push Frontend
      uses: docker/build-push-action@v5
      with:
        context: ./angular-app
        file: ./angular-app/Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:${{ github.sha }}
